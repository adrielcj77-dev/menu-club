<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magma's Club Campestre</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

/* HOME */
.home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #111;
}

.logo {
  width: 80px;
}

/* BOTONES */
button {
  width: 90%;
  max-width: 300px;
  padding: 18px;
  margin: 8px;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  background: #facc15;
  color: black;
}

/* SECCIONES */
.seccion {
  display: none;
  min-height: 100vh;
  padding: 10px;
  background-size: cover;
  background-position: center;
}

/* ITEMS */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.7);
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.item img {
  width: 65px;
  height: 65px;
  border-radius: 10px;
}

/* MODAL ANIMADO */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #222;
  padding: 15px;
  border-radius: 15px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  animation: zoom 0.3s ease;
}

.modal-content img {
  width: 100%;
  border-radius: 10px;
}

@keyframes zoom {
  from {transform: scale(0.5);}
  to {transform: scale(1);}
}
</style>
</head>

<body>

<!-- INICIO -->
<div class="home" id="inicio">
  <img src="logo.png" class="logo">
  <h1>Magma's Club</h1>

  <button onclick="mostrar('comidas')">🍽 COMIDAS</button>
  <button onclick="mostrar('bebidas')">🥤 BEBIDAS</button>
</div>

<!-- COMIDAS -->
<div class="seccion" id="comidas" style="background-image:url('fondo-comidas.jpg')">

<button onclick="volver()">⬅ Volver</button>

<div class="item" onclick="ver(
'Cuy entero frito',
'Cuy dorado acompañado con papas sancochadas, choclo y una deliciosa ensalada mixta bañada con exquisita vinagreta de casa.',
'S/.60',
'cuy-entero.jpg')">
<img src="cuy-entero.jpg"><span>Cuy Entero</span>
</div>

<div class="item" onclick="ver(
'Medio cuy frito',
'1/2 cuy dorado acompañado con papas sancochadas, choclo y una deliciosa ensalada mixta bañada con exquisita vinagreta de casa.',
'S/.30',
'medio-cuy.jpg')">
<img src="medio-cuy.jpg"><span>1/2 Cuy</span>
</div>

<div class="item" onclick="ver(
'Trucha frita',
'Trucha frita acompañada con papas sancochadas, choclo y una deliciosa ensalada mixta bañada con exquisita vinagreta de casa',
'S/.20',
'trucha.jpg')">
<img src="trucha.jpg"><span>Trucha</span>
</div>

<div class="item" onclick="ver(
'Chicharron de chancho',
'Trozos de carne de chancho dorados acompañados con papas sancochadas, chuño, choclo y una deliciosa ensalada mixta de cebolla roja, tomate, hierba buena.',
'S/.20',
'chicharron.jpg')">
<img src="chicharron.jpg"><span>Chicharrón</span>
</div>

<div class="item" onclick="ver(
'Parrilla Mixta',
'Pollo a la plancha con papa sancochada, anticucho, choclo, chorizo, ensalada mixta cubierta de su deliciosa vinagreta y chuleta de chancho',
'S/.30',
'parrilla.jpg')">
<img src="parrilla.jpg"><span>Parrilla Mixta</span>
</div>

<div class="item" onclick="ver(
'Pollo a la plancha',
'Una pechuga de pollo acompañada de papa sancochada, ensalada mixta, cubierta de una deliciosa vinagreta junto a chorizo.',
'S/.20',
'pollo.jpg')">
<img src="pollo.jpg"><span>Pollo a la plancha</span>
</div>

<div class="item" onclick="ver(
'Chuleta a la plancha',
'Chuleta de chancho acompañada de papa sancochada, ensalada mixta, cubierta de una deliciosa vinagreta junto a chorizo',
'S/.20',
'chuleta.jpg')">
<img src="chuleta.jpg"><span>Chuleta a la plancha</span>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrar()">
  <div class="modal-content">
    <img id="img">
    <h3 id="titulo"></h3>
    <p id="desc"></p>
    <b id="precio"></b>
  </div>
</div>

<script>
function mostrar(sec){
  document.getElementById("inicio").style.display="none";
  document.getElementById("comidas").style.display="none";
  document.getElementById("bebidas").style.display="none";
  document.getElementById(sec).style.display="block";
}

function volver(){
  document.getElementById("inicio").style.display="flex";
  document.getElementById("comidas").style.display="none";
  document.getElementById("bebidas").style.display="none";
}

function ver(n,d,p,i){
  document.getElementById("modal").style.display="flex";
  document.getElementById("titulo").innerText=n;
  document.getElementById("desc").innerText=d;
  document.getElementById("precio").innerText=p;
  document.getElementById("img").src=i;
}

function cerrar(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
