<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magma's Club Campestre</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

/* HOME */
.home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #111;
  padding: 10px;
}

.logo {
  width: 80px;
  margin-bottom: 5px;
}

h1 {
  font-size: 22px;
  margin: 5px 0;
}

/* BOTONES GRANDES */
button {
  width: 90%;
  max-width: 300px;
  padding: 18px;
  margin: 8px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #facc15;
  color: black;
  font-weight: bold;
}

/* SECCIONES */
.seccion {
  display: none;
  min-height: 100vh;
  background-size: cover;
  background-position: center;
  padding: 10px;
}

/* ITEMS MÁS COMPACTOS */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.7);
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  font-size: 16px;
}

.item img {
  width: 65px;
  height: 65px;
  border-radius: 10px;
  object-fit: cover;
}

.item span {
  flex: 1;
}

/* BOTÓN VOLVER */
.back {
  padding: 10px;
  margin-bottom: 10px;
  width: auto;
  font-size: 14px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #222;
  padding: 15px;
  border-radius: 10px;
  width: 90%;
  max-width: 300px;
}

.modal-content img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- INICIO -->
<div class="home" id="inicio">
  <img src="logo.png" class="logo">
  <h1>Magma's Club</h1>

  <button onclick="mostrar('comidas')">🍽 COMIDAS</button>
  <button onclick="mostrar('bebidas')">🥤 BEBIDAS</button>
</div>

<!-- COMIDAS -->
<div class="seccion" id="comidas" style="background-image:url('fondo-comidas.jpg')">

<button class="back" onclick="volver()">⬅ Volver</button>
<img src="logo.png" class="logo">

<div class="item" onclick="ver('Cuy Entero','Crocante','S/.60','cuy-entero.jpg')">
<img src="cuy-entero.jpg">
<span>Cuy Entero</span>
<b>S/.60</b>
</div>

<div class="item" onclick="ver('Medio Cuy','Crocante','S/.30','medio-cuy.jpg')">
<img src="medio-cuy.jpg">
<span>1/2 Cuy</span>
<b>S/.30</b>
</div>

<div class="item" onclick="ver('Trucha','Fresca','S/.20','trucha.jpg')">
<img src="trucha.jpg">
<span>Trucha</span>
<b>S/.20</b>
</div>

<div class="item" onclick="ver('Chicharrón','Crujiente','S/.20','chicharron.jpg')">
<img src="chicharron.jpg">
<span>Chicharrón</span>
<b>S/.20</b>
</div>

<div class="item" onclick="ver('Parrilla','Mixta','S/.30','parrilla.jpg')">
<img src="parrilla.jpg">
<span>Parrilla</span>
<b>S/.30</b>
</div>

<div class="item" onclick="ver('Pollo','Parrilla','S/.20','pollo.jpg')">
<img src="pollo.jpg">
<span>Pollo</span>
<b>S/.20</b>
</div>

<div class="item" onclick="ver('Chuleta','Parrilla','S/.20','chuleta.jpg')">
<img src="chuleta.jpg">
<span>Chuleta</span>
<b>S/.20</b>
</div>

</div>

<!-- BEBIDAS -->
<div class="seccion" id="bebidas" style="background-image:url('fondo-bebidas.jpg')">

<button class="back" onclick="volver()">⬅ Volver</button>
<img src="logo.png" class="logo">

<div class="item" onclick="ver('Inca Kola','Refresco','S/.3.50','inca.jpg')">
<img src="inca.jpg">
<span>Inca Kola</span>
<b>S/.3.50</b>
</div>

<div class="item" onclick="ver('Coca Cola','Refresco','S/.3.50','coca.jpg')">
<img src="coca.jpg">
<span>Coca Cola</span>
<b>S/.3.50</b>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrar()">
  <div class="modal-content">
    <img id="img">
    <h3 id="titulo"></h3>
    <p id="desc"></p>
    <b id="precio"></b>
  </div>
</div>

<script>
function mostrar(sec) {
  document.getElementById("inicio").style.display = "none";
  document.getElementById(sec).style.display = "block";
}

function volver() {
  document.getElementById("inicio").style.display = "flex";
  document.getElementById("comidas").style.display = "none";
  document.getElementById("bebidas").style.display = "none";
}

function ver(nombre, desc, precio, imagen) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("titulo").innerText = nombre;
  document.getElementById("desc").innerText = desc;
  document.getElementById("precio").innerText = precio;
  document.getElementById("img").src = imagen;
}

function cerrar() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
